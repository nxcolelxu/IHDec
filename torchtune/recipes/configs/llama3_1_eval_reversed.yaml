# Evaluation config for Llama 3.1 8B base model on both_conflict_default_role_eval.json
# with REVERSED sequence order: data → user2 → assistant → user1 → system

# Tokenizer
tokenizer:
  _component_: torchtune.models.llama3.llama3_tokenizer
  path: ../pretrained_models/llama3_1_8B_base/original/tokenizer.model

# Dataset
dataset:
  _component_: torchtune.datasets.InstructHierarchyValReversed
  source: ../data/both_conflict_default_role_eval.json

seed: 0
shuffle: False

# Model Arguments
model:
  _component_: torchtune.models.llama3_1.llama3_1_8b

checkpointer:
  _component_: torchtune.utils.FullModelMetaCheckpointer
  checkpoint_dir: ../pretrained_models/llama3_1_8B_base/original/
  checkpoint_files: [
    consolidated.00.pth
  ]
  recipe_checkpoint: null
  output_dir: ../output/reversed_eval/
  model_type: LLAMA3

batch_size: 1
device: cuda:1
dtype: bf16

output_dir: ../output/reversed_eval/
output_name: llama3_1_8B_base_reversed

enable_kv_cache: False
quantizer: null

# generation
max_new_tokens: 256
temperature: 0.6
top_k: 300
